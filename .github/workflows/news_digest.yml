name: Daily News Digest Pipeline

on:
  schedule:
    - cron: '30 11,23 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: newsAgent

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: newsAgent/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run News Pipeline
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node index.js

      - name: Commit and Push Updated news.md
        working-directory: .
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add newsAgent/news.md
          # Only commit if changes exist
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update news digest [skip ci]" && git push)
